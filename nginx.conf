server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Public, cacheable design assets — no secrets, so no Cloudflare Access.
  # /latest/ is the live channel every app links; /vN/ are immutable snapshots.
  location /latest/ {
    add_header Cache-Control "public, max-age=300, must-revalidate";
    add_header Access-Control-Allow-Origin "*";
    try_files $uri =404;
  }
  location ~ ^/v[0-9]+/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Access-Control-Allow-Origin "*";
    try_files $uri =404;
  }
  location / {
    add_header Access-Control-Allow-Origin "*";
    try_files $uri $uri/ =404;
  }
}
